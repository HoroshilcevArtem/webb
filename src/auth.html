<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход / Регистрация</title>
    <link rel="stylesheet" href="css/styles.css?v=2">
    <style>
        .auth-box { max-width: 420px; margin: 40px auto; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 8px; color: #fff; }
        .auth-box input { width: 100%; padding: 8px; margin: 8px 0; border-radius:4px; border:1px solid #333; }
        .auth-actions { display:flex; gap:8px; justify-content:space-between; }
        .msg { margin-top:8px; color:#ffb86b; }
    </style>
</head>
<body class="auth-bg">
    <div class="top-panel">
        <div class="top-panel-inner">
            <div class="balance-area"><span>Авторизация</span></div>
            <div class="auth-area"><a href="index.html">На главную</a></div>
        </div>
    </div>

    <main>
        <div class="auth-box" id="auth-box">
            <div class="checkmark" id="checkmark" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path class="tick" d="M4 12l5 5L20 6" />
                </svg>
            </div>
            <h2>Войти или зарегистрироваться</h2>
            <div class="field">
                <input id="username" placeholder="Логин (email или ник)" autocomplete="username" />
            </div>
            <div class="field">
                <input id="password" placeholder="Пароль" type="password" autocomplete="current-password" />
            </div>
            <div class="auth-actions">
                <button id="login" class="btn btn-primary">Войти</button>
                <button id="register" class="btn btn-secondary">Зарегистрироваться</button>
            </div>
            <div class="msg" id="msg"><span id="msg-text"></span></div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        // make page fade in (re-uses styles.css .fade-in)
        document.addEventListener('DOMContentLoaded',()=>{
            document.body.classList.add('fade-in');
            // focus field after animation start
            setTimeout(()=>{
                const el = document.getElementById('username');
                if (el) el.focus();
            }, 50);
        });

        // ripple helper for buttons
        document.addEventListener('click', function(e){
            const btn = e.target.closest('.btn');
            if (!btn) return;
            const r = document.createElement('span');
            r.className = 'ripple';
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            r.style.width = r.style.height = size + 'px';
            r.style.left = (e.clientX - rect.left - size/2) + 'px';
            r.style.top = (e.clientY - rect.top - size/2) + 'px';
            btn.appendChild(r);
            r.addEventListener('animationend', ()=> r.remove());
        });
    </script>
</body>
</html>
