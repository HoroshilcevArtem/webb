<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игровой Автомат</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="bg-bot">
    <!-- Top semi-transparent panel: shows user id and balance, and link to auth -->
    <div class="top-panel">
        <div class="top-panel-inner">
            <div class="balance-area">
                <span id="user-id">ID: —</span>
                <span id="user-balance">Баланс: —</span>
            </div>
            <div class="auth-area">
                <a id="auth-link" href="auth.html">Войти / Регистрация</a>
                <button id="logout-btn" class="hidden">Выйти</button>
            </div>
        </div>
    </div>
    <main>
        <section class="hero">
            <div class="container">
                <div class="slot-machine">
                    <div class="reel"><img src="assets/Kazino/none.png" alt="Ошибка"></div>
                    <div class="reel"><img src="assets/Kazino/none.png" alt="Ошибка"></div>
                    <div class="reel"><img src="assets/Kazino/none.png" alt="Ошибка"></div>
                </div>
                <button id="spin-button">Крутить</button>
                <button class="side-arrow-btn" aria-label="Прокрутить вправо">&#8594;</button>
                <section class="menu centered-menu">
                    <table>
                        <tr>
                            <td><button id="slot-machine-button">Слот-машина</button></td>
                            <td><button id="log-button">Лог</button></td>
                            <td><button id="exit-button">Выход</button></td>
                        </tr>
                    </table>
                </section>
            </div>
        </section>

        <section class="log hidden">
            <div class="log-container">
                <button id="close-log-button" class="close-button">×</button>
                <table id="log-table">
                    <!-- Логи выигрышей будут добавляться здесь -->
                </table>
            </div>
        </section>

        <section class="slot-list hidden">
            <div class="slot-hidden">
                <button id="close-slot-list-button" class="close-slot-button">×</button>
            </div>
        </section>

    </main>
    <script src="js/script.js"></script>
    <script>
        // Load current user info from token (if any) and update top panel
        (function(){
            const authToken = localStorage.getItem('authToken');
            const userIdEl = document.getElementById('user-id');
            const userBalanceEl = document.getElementById('user-balance');
            const authLink = document.getElementById('auth-link');
            const logoutBtn = document.getElementById('logout-btn');

            function setLoggedOut() {
                userIdEl.textContent = 'ID: —';
                userBalanceEl.textContent = 'Баланс: —';
                authLink.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
            }

            if (!authToken) {
                setLoggedOut();
                return;
            }

            fetch('http://localhost:3001/me', {
                headers: { 'Authorization': 'Bearer ' + authToken }
            }).then(r => r.json()).then(data => {
                if (data && data.id) {
                    userIdEl.textContent = 'ID: ' + data.id;
                    userBalanceEl.textContent = 'Баланс: ' + (data.balance ?? 0);
                    authLink.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                } else {
                    setLoggedOut();
                }
            }).catch(() => setLoggedOut());

            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('authToken');
                setLoggedOut();
                // reload to update any UI
                window.location.reload();
            });
        })();
    </script>
    <script>
        document.querySelector('.side-arrow-btn').addEventListener('click', () => {
            window.location.href = 'car.html';
        });
    </script>
</body>
</html>
